trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
  acrName: proj5acr.azurecr.io
  imageName: java-app
  imageTag: $(Build.BuildId)

stages:

# =====================================================
# STAGE 1 — CI Build, Scan, Push Docker Image
# =====================================================
- stage: BuildAndPush
  displayName: "CI - Build and Push Image"

  jobs:
  - job: BuildJob
    displayName: "Build Java App and Docker Image"

    steps:

    # -----------------------------------
    # Checkout Source Code
    # -----------------------------------
    - checkout: self

    # -----------------------------------
    # SonarCloud Prepare
    # -----------------------------------
    - task: SonarCloudPrepare@3
      displayName: "Prepare SonarCloud Analysis"
      inputs:
        SonarCloud: 'sonarcloud-conn'
        organization: 'mallipudianil22'
        scannerMode: 'Other'
        extraProperties: |
          sonar.projectKey=mallipudianil22_Project5-CI
          sonar.projectName=Project5-CI

    # -----------------------------------
    # Maven Build
    # -----------------------------------
    - task: Maven@4
      displayName: "Build Java Application"
      inputs:
        mavenPomFile: 'pom.xml'
        goals: 'clean package'
        publishJUnitResults: true
        javaHomeOption: 'JDKVersion'
        jdkVersionOption: '1.17'

    # -----------------------------------
    # SonarCloud Analysis
    # -----------------------------------
    - task: SonarCloudAnalyze@3
      displayName: "Run SonarCloud Analysis"

    # -----------------------------------
    # Publish SonarCloud Results
    # -----------------------------------
    - task: SonarCloudPublish@3
      displayName: "Publish SonarCloud Results"
      inputs:
        pollingTimeoutSec: '300'

    
    # -----------------------------------
    # Docker Build
    # -----------------------------------
    - task: Docker@2
      displayName: "Build Docker Image"
      inputs:
        command: build
        repository: $(acrName)/$(imageName)
        Dockerfile: Dockerfile
        tags: |
          $(imageTag)
    
    # -----------------------------------
    # Trivy Security Scan
    # -----------------------------------
    - script: |
        curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin

        trivy image $(acrName)/$(imageName):$(imageTag)
      displayName: "Trivy Image Scan"

    # -----------------------------------
    # Docker Push to ACR
    # -----------------------------------
    - task: Docker@2
      displayName: "Push Docker Image to ACR"
      inputs:
        containerRegistry: 'acrservice-conn'
        command: push
        repository: $(imageName)
        tags: |
          $(imageTag)

    # -----------------------------------
    # Export Image Tag
    # -----------------------------------
    - task: Bash@3
      name: SetImageTag
      displayName: "Export Image Tag"
      inputs:
        targetType: inline
        script: |
          echo "##vso[task.setvariable variable=imageTag;isOutput=true]$(Build.BuildId)"

# =====================================================
# STAGE 2 — Update GitHub GitOps Repo
# =====================================================
- stage: UpdateGitOps
  displayName: "CD - Update GitOps Repository"

  dependsOn: BuildAndPush
  condition: succeeded()

  variables:
    imageTag: $[ stageDependencies.BuildAndPush.BuildJob.outputs['SetImageTag.imageTag'] ]

  jobs:
  - job: UpdateGitOpsJob
    displayName: "Update Deployment Manifest"

    steps:

    - checkout: none

    # -----------------------------------
    # Clone GitOps Repo and Update Image
    # -----------------------------------
    - task: Bash@3
      displayName: "Clone and Update GitOps Repo"

      env:
        GITHUB_PAT: $(GITHUB_PAT)
        GITHUB_USERNAME: $(GITHUB_USERNAME)

      inputs:
        targetType: inline
        script: |

          echo "Configuring Git..."

          git config --global user.email "pipeline@devops.com"
          git config --global user.name "Azure DevOps Pipeline"

          echo "Cloning GitHub GitOps repository..."

          git clone https://${GITHUB_USERNAME}:${GITHUB_PAT}@github.com/MercyChristinaLanka/gitops-repo.git

          cd gitops-repo

          git checkout main

          FULL_IMAGE="$(acrName)/$(imageName):$(imageTag)"

          echo "Updating deployment.yaml with image:"
          echo $FULL_IMAGE

          sed -i "s|image: .*|image: ${FULL_IMAGE}|" deployment.yaml

          echo "Updated deployment.yaml:"
          cat deployment.yaml

          git add deployment.yaml

          git commit -m "Updated image to ${FULL_IMAGE}"

          git push origin main

          echo "GitOps repository updated successfully!"