trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
  imageName: springbootapp

steps:

# Maven Build
- task: Maven@4
  inputs:
    mavenPomFile: 'pom.xml'
    goals: 'clean package'
    publishJUnitResults: true

# Docker Build and Push
- task: Docker@2
  inputs:
    containerRegistry: 'acrservice-conn'
    repository: 'springbootapp'
    command: 'buildAndPush'
    Dockerfile: '**/Dockerfile'
    tags: |
      latest
      $(Build.BuildId)

# Install Trivy
- script: |
    wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.51.1_Linux-64bit.deb
    sudo dpkg -i trivy_0.51.1_Linux-64bit.deb
  displayName: Install Trivy

# Trivy Scan
- script: |
    trivy image proj5acr.azurecr.io/springbootapp:$(Build.BuildId)
  displayName: Trivy Scan