trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
  imageName: springbootapp
  acrName: proj5acr.azurecr.io
  imageTag: $(Build.BuildId)

steps:

# ======================
# Maven Build
# ======================
- task: Maven@4
  inputs:
    mavenPomFile: 'pom.xml'
    goals: 'clean package'
    publishJUnitResults: true


# ======================
# Docker Build & Push
# ======================
- task: Docker@2
  inputs:
    containerRegistry: 'acrservice-conn'
    repository: 'springbootapp'
    command: 'buildAndPush'
    Dockerfile: 'Dockerfile'
    tags: |
      latest
      $(Build.BuildId)


# ======================
# Install Trivy (FIXED)
# ======================
- script: |
    sudo apt-get update -y
    sudo apt-get install -y wget

    wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.53.0_Linux-64bit.deb
    sudo dpkg -i trivy_0.53.0_Linux-64bit.deb
  displayName: Install Trivy


# ======================
# Trivy Scan (FIXED IMAGE NAME)
# ======================
- script: |
    trivy image $(acrName)/$(imageName):$(imageTag)
  displayName: Trivy Scan